version: '3.8'
services:
  backend:
    build: ./backend
    container_name: ppe-rag-backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_INDEX_NAME=${PINECONE_INDEX_NAME}
      - PINECONE_ENVIRONMENT=${PINECONE_ENVIRONMENT}
      - DEBUG=True
    volumes:
      - ./backend:/app
    networks:
      - ppe-network
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: ppe-rag-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - ppe-network

networks:
  ppe-network:
    driver: bridge